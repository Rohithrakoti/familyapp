<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Events</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="events-page">

<header>
    <h1>Family Events</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="social.html">Social Media</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="hero">
        <h2>Upcoming Events</h2>
    </section>

    <section class="cards">

        <!-- Event List -->
        <div class="card">
            <h3>Event List</h3>
            <ul id="event-list"></ul>
        </div>

        <!-- Add Event -->
        <div class="card add-event-form">
            <h3>Add Event</h3>

            <label>Event Name:</label>
            <input type="text" id="event-name" placeholder="Event Name">

            <label>From Date:</label>
            <input type="date" id="event-from-date">

            <label>To Date:</label>
            <input type="date" id="event-to-date">

            <label>Image URL:</label>
            <input type="text" id="event-image" placeholder="images/sample.jpg">

            <label>Details:</label>
            <textarea id="event-details"></textarea>

            <button onclick="addEvent()">Add Event</button>
        </div>

    </section>

</main>

<footer>
    <p>&copy; Mana Kutumbam</p>
</footer>

<!-- 🔥 EVENT MODAL -->
<div id="event-modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>

        <h2 id="modal-title"></h2>
        <p id="modal-dates"></p>

        <img id="modal-image" alt="Event Image">

        <p id="modal-details"></p>
    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
